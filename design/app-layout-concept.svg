<svg width="1800" height="1100" viewBox="0 0 1800 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDF5F2"/>
      <stop offset="1" stop-color="#DCEBE5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F7FBF9" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#8AAFA2" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <text x="90" y="90" fill="#21463B" font-family="Manrope, Arial" font-size="44" font-weight="800">Chill Dude - Mobile Layout Concept (V1)</text>
  <text x="90" y="130" fill="#4B6A60" font-family="Manrope, Arial" font-size="24" font-weight="500">Modern Focus + Hybrid tone | Flow: Scan -> Journal -> Recommendation -> Focus/Relax</text>

  <!-- Phone 1 -->
  <g transform="translate(90,180)" filter="url(#shadow)">
    <rect x="0" y="0" rx="42" ry="42" width="360" height="760" fill="#10211B"/>
    <rect x="14" y="14" rx="34" ry="34" width="332" height="732" fill="url(#panel)"/>
    <rect x="137" y="26" rx="8" ry="8" width="86" height="10" fill="#C3D9D0"/>

    <text x="36" y="82" fill="#1F3A32" font-family="Manrope, Arial" font-size="18" font-weight="700">Daily Scan</text>
    <text x="36" y="106" fill="#54766B" font-family="Manrope, Arial" font-size="13">Align your face and stay still</text>

    <rect x="36" y="134" rx="24" ry="24" width="260" height="400" fill="#DCEAE5"/>
    <circle cx="166" cy="334" r="96" fill="#EAF4F0" stroke="#5C9484" stroke-width="3"/>
    <circle cx="166" cy="334" r="76" fill="none" stroke="#2F8A75" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="118" y="344" fill="#2F8A75" font-family="Manrope, Arial" font-size="14" font-weight="700">Scanning...</text>

    <rect x="36" y="566" rx="14" ry="14" width="260" height="58" fill="#2F8A75"/>
    <text x="118" y="601" fill="#FFFFFF" font-family="Manrope, Arial" font-size="16" font-weight="700">Continue</text>

    <text x="36" y="660" fill="#607D73" font-family="Manrope, Arial" font-size="12">Face signal only for V1. No mood selector.</text>
  </g>

  <!-- Phone 2 -->
  <g transform="translate(500,180)" filter="url(#shadow)">
    <rect x="0" y="0" rx="42" ry="42" width="360" height="760" fill="#10211B"/>
    <rect x="14" y="14" rx="34" ry="34" width="332" height="732" fill="url(#panel)"/>
    <rect x="137" y="26" rx="8" ry="8" width="86" height="10" fill="#C3D9D0"/>

    <text x="36" y="82" fill="#1F3A32" font-family="Manrope, Arial" font-size="18" font-weight="700">Daily Journal</text>
    <text x="36" y="106" fill="#54766B" font-family="Manrope, Arial" font-size="13">One honest entry, once per day</text>

    <rect x="36" y="140" rx="18" ry="18" width="260" height="380" fill="#FFFFFF" stroke="#CCE0D8"/>
    <text x="52" y="176" fill="#5B7A70" font-family="Manrope, Arial" font-size="12">How did your day feel?</text>
    <text x="52" y="204" fill="#38574E" font-family="Manrope, Arial" font-size="13">- morning energy</text>
    <text x="52" y="228" fill="#38574E" font-family="Manrope, Arial" font-size="13">- biggest stress trigger</text>
    <text x="52" y="252" fill="#38574E" font-family="Manrope, Arial" font-size="13">- one thing that helped</text>
    <rect x="52" y="280" rx="10" ry="10" width="228" height="220" fill="#F6FBF8" stroke="#D5E7E0"/>

    <rect x="36" y="546" rx="14" ry="14" width="260" height="58" fill="#2F8A75"/>
    <text x="126" y="581" fill="#FFFFFF" font-family="Manrope, Arial" font-size="16" font-weight="700">Submit</text>

    <text x="36" y="652" fill="#607D73" font-family="Manrope, Arial" font-size="12">Submitted entries become read-only diary pages.</text>
  </g>

  <!-- Phone 3 -->
  <g transform="translate(910,180)" filter="url(#shadow)">
    <rect x="0" y="0" rx="42" ry="42" width="360" height="760" fill="#10211B"/>
    <rect x="14" y="14" rx="34" ry="34" width="332" height="732" fill="url(#panel)"/>
    <rect x="137" y="26" rx="8" ry="8" width="86" height="10" fill="#C3D9D0"/>

    <text x="36" y="82" fill="#1F3A32" font-family="Manrope, Arial" font-size="18" font-weight="700">Today&apos;s Recommendation</text>
    <text x="36" y="106" fill="#54766B" font-family="Manrope, Arial" font-size="13">Auto-generated from scan + journal summary</text>

    <rect x="36" y="138" rx="18" ry="18" width="260" height="160" fill="#EAF5F1" stroke="#BFDCD1"/>
    <text x="52" y="178" fill="#225244" font-family="Manrope, Arial" font-size="13" font-weight="700">Detected state:</text>
    <text x="52" y="204" fill="#1F3A32" font-family="Manrope, Arial" font-size="25" font-weight="800">Calm but tired</text>
    <text x="52" y="232" fill="#4E7066" font-family="Manrope, Arial" font-size="12">Reason: low energy words + neutral face pattern</text>

    <rect x="36" y="326" rx="14" ry="14" width="260" height="58" fill="#2F8A75"/>
    <text x="116" y="361" fill="#FFFFFF" font-family="Manrope, Arial" font-size="16" font-weight="700">Start Focus</text>

    <rect x="36" y="398" rx="14" ry="14" width="260" height="58" fill="#EAF5F1" stroke="#BFDCD1"/>
    <text x="121" y="433" fill="#2F6E5D" font-family="Manrope, Arial" font-size="16" font-weight="700">Open Relax</text>

    <rect x="36" y="486" rx="16" ry="16" width="260" height="170" fill="#FFFFFF" stroke="#CCE0D8"/>
    <text x="52" y="518" fill="#375A50" font-family="Manrope, Arial" font-size="12" font-weight="700">Daily Diary Summary</text>
    <text x="52" y="542" fill="#5A7A70" font-family="Manrope, Arial" font-size="12">"You stayed responsible despite feeling overloaded.</text>
    <text x="52" y="562" fill="#5A7A70" font-family="Manrope, Arial" font-size="12">Short focus blocks and evening wind-down are ideal."</text>
  </g>

  <!-- Phone 4 -->
  <g transform="translate(1320,180)" filter="url(#shadow)">
    <rect x="0" y="0" rx="42" ry="42" width="360" height="760" fill="#10211B"/>
    <rect x="14" y="14" rx="34" ry="34" width="332" height="732" fill="url(#panel)"/>
    <rect x="137" y="26" rx="8" ry="8" width="86" height="10" fill="#C3D9D0"/>

    <text x="36" y="82" fill="#1F3A32" font-family="Manrope, Arial" font-size="18" font-weight="700">Weekly Insights</text>
    <text x="36" y="106" fill="#54766B" font-family="Manrope, Arial" font-size="13">Stress trend and focus time overview</text>

    <rect x="36" y="136" rx="16" ry="16" width="260" height="210" fill="#FFFFFF" stroke="#CCE0D8"/>
    <polyline points="52,300 88,268 124,280 160,238 196,222 232,244 268,208" fill="none" stroke="#2F8A75" stroke-width="4"/>
    <line x1="52" y1="300" x2="268" y2="300" stroke="#CFE2DB"/>
    <text x="52" y="170" fill="#406359" font-family="Manrope, Arial" font-size="12" font-weight="700">Stress Index (7 days)</text>

    <rect x="36" y="366" rx="16" ry="16" width="260" height="180" fill="#FFFFFF" stroke="#CCE0D8"/>
    <rect x="56" y="500" width="22" height="24" rx="4" fill="#88C4B3"/>
    <rect x="92" y="470" width="22" height="54" rx="4" fill="#5EA995"/>
    <rect x="128" y="446" width="22" height="78" rx="4" fill="#2F8A75"/>
    <rect x="164" y="484" width="22" height="40" rx="4" fill="#73B9A6"/>
    <rect x="200" y="462" width="22" height="62" rx="4" fill="#3B987F"/>
    <text x="52" y="396" fill="#406359" font-family="Manrope, Arial" font-size="12" font-weight="700">Focus Minutes</text>

    <rect x="36" y="568" rx="14" ry="14" width="260" height="58" fill="#EAF5F1" stroke="#BFDCD1"/>
    <text x="92" y="603" fill="#2F6E5D" font-family="Manrope, Arial" font-size="15" font-weight="700">Take a mini break now</text>
  </g>
</svg>
